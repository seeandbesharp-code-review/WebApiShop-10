version: '3.8'

services:
  redis:
    image: redis:alpine
    command: redis-server --requirepass yourpassword
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "Your_password123"
      ACCEPT_EULA: "Y"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./sql-init:/init
    command: /bin/bash -c "/opt/mssql/bin/sqlservr & sleep 20 && /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Your_password123' -C -Q \"IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = '_API_shop') CREATE DATABASE [_API_shop]\" && /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'Your_password123' -C -d _API_shop -i /init/init.sql && wait"

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,EXTERNAL://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__new_connection=Data Source=sqlserver;Initial Catalog=_API_shop;User ID=sa;Password=Your_password123;Trust Server Certificate=True
      - ConnectionStrings__Redis=redis:6379,password=yourpassword
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__Topic=orders
    depends_on:
      - redis
      - kafka
      - sqlserver

  consumer:
    build:
      context: .
      dockerfile: KafkaConsumer/Dockerfile
    environment:
      - Kafka__BootstrapServers=kafka:9092
      - Kafka__Topic=orders
    depends_on:
      - kafka

volumes:
  redis_data:
  sqlserver_data:
